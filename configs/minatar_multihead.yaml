# === MinAtar continual proof-of-concept: multi-head CNN over MinAtar games ===
#
# A sequence of MinAtar games (different visuals + dynamics, shared 6-action
# space) learned with a shared conv trunk + per-task action heads. Unlike the
# compatible CartPole physics tasks, different games force genuinely conflicting
# features into the shared trunk -- the regime where forgetting is expected.
#
# Method is pure policy-gradient REINFORCE (no critic), matching the derivation.
# Performance metric is the game score (mean episode return), not value.
#
# NOTE eps/duals are placeholders here: the finetune baseline (forgetting check)
# does not use the constraint. Per-game reward scales differ ~10x, so the
# constrained method will need per-task eps or reward scaling (added after the
# forgetting check confirms the benchmark is non-degenerate).
experiment:
  name: minatar_multihead
  seed: 0
  results_dir: results
  device: auto
  log_every: 100

env:
  family: minatar
  params:
    gamma: 0.99
    max_steps: 500
    sticky_action_prob: 0.1
    difficulty_ramping: true
  tasks:                       # strong-signal game first (forgetting most visible)
    - { game: space_invaders }
    - { game: breakout }
    - { game: asterix }
    - { game: seaquest }

policy:
  kind: cnn_multihead          # shared conv trunk + one action head per game
  hidden_sizes: [128]
  task_conditioned: false      # separate heads only; check forgetting first

estimator:
  kind: monte_carlo
  episodes_per_grad: 32
  episodes_per_eval: 32
  episodes_per_ref: 48
  baseline: batch_mean
  time_discount_weighting: true

duals:
  kind: projected_ascent
  lr: 0.02
  init: 0.0
  max_value: 100.0
  warm_start: true

trainer:
  cycles_per_task: 2
  local_steps: 600
  global_steps: 200
  task1_steps: 1600
  lr_local: 0.001
  lr_global: 0.001
  optimizer: adam
  eps: 1.0
  past_task_sampling: sample
  entropy_coef: 0.005
  eval_episodes: 32
  eval_all_tasks: true
  eval_probe_every: 100
  report_return: true          # paper metric = game score (undiscounted return), not value
