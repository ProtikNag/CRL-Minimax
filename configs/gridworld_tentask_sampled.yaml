# === PROOF-OF-CONCEPT (HPC, multi-seed): TEN tasks under real rollouts ===
#
# Ten goal-reaching tasks on a 9x9 gridworld with the Monte-Carlo (REINFORCE)
# estimator -- real environment rollouts and sampling noise, at a task count
# that genuinely stresses continual learning. This is the headline
# proof-of-concept: does the constrained min-max formulation retain all ten
# tasks where a naive sequential learner forgets the old ones?
#
# Cost control: with ten tasks, past_task_sampling MUST be "sample" (one past
# task per step, rescaled to stay unbiased -> O(1) per-step cost) rather than
# "all" (which would roll out all nine past tasks every step). Frozen references
# are estimated once per phase with a large batch (episodes_per_ref) and held.
#
# Run one seed (maps to a SLURM array index):
#   python -m experiments.multiseed_comparison \
#     --config configs/gridworld_tentask_sampled.yaml --name gridworld_tentask --seed 0
# Aggregate all seeds into the error-barred report bundle:
#   python -m experiments.aggregate_seeds --name gridworld_tentask --seeds 0 1 2 3 4
experiment:
  name: gridworld_tentask_sampled
  seed: 0
  results_dir: results
  log_every: 100

env:
  family: gridworld
  params:
    size: 9
    slip: 0.1
    gamma: 0.98          # 9x9 grid -> higher gamma keeps optimal values ~0.85
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 200
  tasks:                 # ten goals spread across the 9x9 grid
    - goal: [0, 8]
    - goal: [8, 8]
    - goal: [8, 0]
    - goal: [0, 0]
    - goal: [4, 4]
    - goal: [0, 4]
    - goal: [8, 4]
    - goal: [4, 0]
    - goal: [4, 8]
    - goal: [2, 6]

policy:
  kind: multihead
  hidden_sizes: [128, 128]
  task_conditioned: true

estimator:
  kind: monte_carlo
  episodes_per_grad: 32
  episodes_per_eval: 32
  episodes_per_ref: 128         # frozen references, once per phase (large batch)
  baseline: batch_mean
  time_discount_weighting: true

duals:
  kind: projected_ascent
  lr: 2.0                       # F-hat is noisy under sampling; keep modest
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 3
  local_steps: 200
  global_steps: 200
  task1_steps: 300
  lr_local: 0.02
  lr_global: 0.02
  optimizer: adam
  eps: 0.0025                   # squared-value units (tolerated value gap ~ 0.05)
  past_task_sampling: sample    # O(1) per-step cost -- required at ten tasks
  entropy_coef: 0.01
  eval_episodes: 64
  eval_all_tasks: true
  eval_probe_every: 100
