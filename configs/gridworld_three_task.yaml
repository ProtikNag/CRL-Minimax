# Tier 0c: three-task exact gridworld. Runs, and the constrained global still
# beats the unconstrained baseline on AVERAGE retained value -- but it also
# EXPOSES A KNOWN OPEN ISSUE: with a shared (non task-conditioned) tabular
# policy, the eq-2 warm-start (theta^(0) = phi) saturates the softmax, and by
# the third task policy gradient escapes the inherited init too slowly, so the
# last task learns poorly regardless of local_steps. Task 3 is fully learnable
# from a fresh policy (~0.75), so this is a saturation effect of the warm-start,
# not an env/estimator bug. See HANDOFF.md "Saturation" for candidate fixes
# (task-conditioned policy head, stronger entropy, periodic policy softening).
#
# Use this config to study that failure mode, not as a clean success demo.
experiment:
  name: gridworld_three_task
  seed: 42
  results_dir: results
  log_every: 20

env:
  family: gridworld
  params:
    size: 5
    slip: 0.1
    gamma: 0.95
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 100
  tasks:
    - goal: [0, 4]
    - goal: [4, 4]
    - goal: [4, 0]

policy:
  kind: tabular
  # Flip to mlp + task_conditioned: true to test the saturation fix.

estimator:
  kind: exact

duals:
  kind: projected_ascent
  lr: 8.0
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 4
  local_steps: 300
  global_steps: 300
  task1_steps: 120
  lr_local: 0.7
  lr_global: 0.7
  optimizer: sgd
  eps: 0.0016
  past_task_sampling: all
  entropy_coef: 0.02
  eval_episodes: 32
  eval_all_tasks: true
