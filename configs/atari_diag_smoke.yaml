experiment:
  name: atari_diag_smoke
  seed: 0
  results_dir: results
  device: auto
  log_every: 25
env:
  family: atari
  params:
    gamma: 0.99
    max_steps: 4000
    frame_skip: 4
    frame_stack: 4
    noop_max: 30
    terminal_on_life_loss: false
    repeat_action_probability: 0.0
    clip_rewards: true
  tasks:
  - game: Pong
    threshold: 18
  - game: Breakout
    threshold: 50
  - game: Boxing
    threshold: 90
policy:
  kind: cnn_ac_multihead
  hidden_sizes:
  - 512
  task_conditioned: true
duals:
  kind: projected_ascent
  lr: 0.3
  init: 0.0
  max_value: 1000.0
  warm_start: false
trainer:
  kind: ppo
  cycles_per_task: 1
  eps: 0.04
  eval_all_tasks: true
ppo:
  method: constrained
  n_envs: 8
  n_steps: 128
  ppo_epochs: 4
  num_minibatches: 4
  clip_ratio: 0.1
  gae_lambda: 0.95
  vf_coef: 0.5
  ent_coef: 0.01
  max_grad_norm: 0.5
  lr: 0.00025
  normalize_advantage: true
  task1_iters: 20
  local_iters: 15
  global_iters: 24
  min_iters: 5
  patience: 3
  stop_eval_every: 50
  stop_eval_episodes: 2
  constraint_episodes: 2
  constraint_every: 8
  eval_episodes: 6
  eval_greedy: true
  eval_seed: 100000
  eval_every: 0
  eval_greedy_episodes: 6
  diagnostics: true
  diag_every: 8
  diag_score_episodes: 2
