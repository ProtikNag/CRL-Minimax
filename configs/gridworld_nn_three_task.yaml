# Tier 1 (neural): three-task gridworld with a real neural network.
#
# Policy is a multi-head MLP -- a shared Tanh trunk with one output head per
# task, plus a one-hot task id on the trunk input. Separate heads give each
# task its own output mapping (resolving the shared-representation conflict
# that made the single tabular table fail past task 2), while the shared trunk
# carries transfer. The exact estimator still applies: observations are one-hot
# states, so the network defines pi(a|s) for every state and values are solved
# in closed form (zero sampling noise, seconds per run).
#
# Headline result (this config vs the same config with duals.lr: 0):
#   constrained  final row ~ [0.84, 0.84, 0.84]   (all tasks retained)
#   unconstrained final row ~ [0.84, 0.84, 0.20]  (newest task forgotten)
# Run both with:  python -m experiments.compare_constraint \
#                    --config configs/gridworld_nn_three_task.yaml --name nn_three_task
experiment:
  name: gridworld_nn_three_task
  seed: 42
  results_dir: results
  log_every: 25

env:
  family: gridworld
  params:
    size: 5
    slip: 0.1
    gamma: 0.95
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 100
  tasks:                     # three corners: deliberate cross-task conflict
    - goal: [0, 4]
    - goal: [4, 4]
    - goal: [4, 0]

policy:
  kind: multihead            # shared trunk + one head per task
  hidden_sizes: [128, 128]   # ample capacity for 3 tasks
  task_conditioned: true     # also append the one-hot task id to the trunk input

estimator:
  kind: exact

duals:
  kind: projected_ascent
  lr: 8.0                    # eta on the squared shortfall
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 3
  local_steps: 300
  global_steps: 300
  task1_steps: 300
  lr_local: 0.05             # Adam step on the network
  lr_global: 0.05
  optimizer: adam
  eps: 0.0016                # squared-value units: tolerated value gap ~ 0.04
  past_task_sampling: all
  entropy_coef: 0.0
  eval_episodes: 32
  eval_all_tasks: true
  eval_probe_every: 25       # learning-curve sampling density
