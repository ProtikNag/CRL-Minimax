# === MinAtar Double-DQN min-max: scaled budget, 3-seed headline ===
#
# Larger version of minatar_dqn.yaml for the headline result:
#   (a) higher training budget + longer episodes -> higher absolute ceilings
#   (c) 2.5x local-phase steps (+ more global steps) so the local fully masters
#       each game -- in particular the LAST task (Seaquest), closing the
#       plasticity gap seen at the smaller budget.
# Run over 3 seeds (continual / finetune / experts) and aggregate with CIs.
experiment:
  name: minatar_dqn_big
  seed: 0
  results_dir: results
  device: auto
  log_every: 1000

env:
  family: minatar
  params:
    gamma: 0.99
    max_steps: 400             # longer episodes -> more score headroom (higher ceilings)
    sticky_action_prob: 0.1
    difficulty_ramping: true
  tasks:
    - { game: space_invaders, reward_scale: 0.067 }
    - { game: breakout,       reward_scale: 0.25 }
    - { game: asterix,        reward_scale: 1.4 }
    - { game: seaquest,       reward_scale: 1.1 }

policy:
  kind: qnet_multihead
  hidden_sizes: [128]
  task_conditioned: false

estimator:
  kind: monte_carlo

duals:
  kind: projected_ascent
  lr: 1.0
  init: 0.0
  max_value: 100.0
  warm_start: true

dqn:
  lr: 0.0001
  batch_size: 32
  buffer_capacity: 200000
  target_sync_every: 1000
  warmup_transitions: 5000
  collect_per_step: 4
  num_envs: 8
  grad_clip: 10.0
  task1_steps: 60000           # (a) up from 25k
  local_steps: 50000           # (a)+(c) up from 20k -- local fully masters each game
  global_steps: 25000          # (c) up from 10k -- global tracks the stronger local
  cycles_per_task: 1
  eps_start: 1.0
  eps_end: 0.05
  eps_decay_steps: 40000
  eps_constraint: 0.04
  value_episodes: 30
  value_every: 1000
  past_task_sampling: sample
  eval_episodes: 100
  log_every: 1000
