# Tier 2 (scaling): SIX tasks on a larger 7x7 gridworld, exact estimator.
#
# Validated scaling check for the method (fast, ~1-2 min on CPU, no rollouts).
# Add or remove entries under env.tasks to move between 5 and 10 tasks; the
# multi-head policy grows one head per task automatically.
#
# Result (this config vs the fine-tuning / ablation baselines):
#   constrained (ours) retains all six tasks (mean value ~0.86);
#   naive fine-tuning shows decaying catastrophic forgetting of older tasks
#   (mean ~0.37, only the newest task intact).
#
# Reproduce the full four-method comparison + figures:
#   python -m experiments.baseline_comparison \
#     --config configs/gridworld_manytask_exact.yaml --name gridworld_manytask
experiment:
  name: gridworld_manytask_exact
  seed: 42
  results_dir: results
  log_every: 50

env:
  family: gridworld
  params:
    size: 7
    slip: 0.1
    gamma: 0.97          # larger grid -> higher gamma keeps optimal values ~0.85
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 150
  tasks:                 # six goals spread across the grid (add more for 7-10)
    - goal: [0, 6]
    - goal: [6, 6]
    - goal: [6, 0]
    - goal: [0, 0]
    - goal: [3, 3]
    - goal: [3, 6]

policy:
  kind: multihead
  hidden_sizes: [128, 128]
  task_conditioned: true

estimator:
  kind: exact

duals:
  kind: projected_ascent
  lr: 8.0
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 3
  local_steps: 300
  global_steps: 300
  task1_steps: 300
  lr_local: 0.05
  lr_global: 0.05
  optimizer: adam
  eps: 0.0016
  past_task_sampling: all      # switch to "sample" to cap per-step cost at O(1)
  entropy_coef: 0.0
  eval_episodes: 32
  eval_all_tasks: true
  eval_probe_every: 50
