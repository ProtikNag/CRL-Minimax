# === NEXT EXPERIMENT (HPC): many tasks under real rollouts ===
#
# Six tasks on a 7x7 gridworld with the Monte-Carlo (REINFORCE) estimator, i.e.
# real environment rollouts and sampling noise, at a task count where per-step
# cost matters. This is the first experiment that genuinely needs a cluster:
# every primal step rolls out the current task plus each past task, so cost
# grows with the number of tasks.
#
# Cost controls to reach before scaling further:
#   - past_task_sampling: sample   -> one past task per step (O(1), unbiased)
#   - episodes_per_ref large, once per phase (frozen references dominate cost)
#   - lower cycles_per_task / *_steps first; raise episodes_per_grad only if the
#     gradient is too noisy to learn.
#
# The hyperparameters below are a STARTING POINT (the exact-estimator version
# `gridworld_manytask_exact.yaml` is validated; this sampled version needs a
# tuning pass -- watch the mu/lambda magnitudes and the gap figure on run 1).
#
# HPC run:  sbatch scripts/hpc_baseline.sbatch    (see that file)
# or direct: python -m experiments.baseline_comparison \
#              --config configs/gridworld_manytask_sampled.yaml --name gridworld_manytask_sampled
experiment:
  name: gridworld_manytask_sampled
  seed: 42
  results_dir: results
  log_every: 50

env:
  family: gridworld
  params:
    size: 7
    slip: 0.1
    gamma: 0.97
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 150
  tasks:
    - goal: [0, 6]
    - goal: [6, 6]
    - goal: [6, 0]
    - goal: [0, 0]
    - goal: [3, 3]
    - goal: [3, 6]

policy:
  kind: multihead
  hidden_sizes: [128, 128]
  task_conditioned: true

estimator:
  kind: monte_carlo
  episodes_per_grad: 32
  episodes_per_eval: 32
  episodes_per_ref: 128         # frozen references, once per phase (large batch)
  baseline: batch_mean
  time_discount_weighting: true

duals:
  kind: projected_ascent
  lr: 2.0                       # lower than the exact tier: F-hat is noisy
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 3
  local_steps: 200
  global_steps: 200
  task1_steps: 300
  lr_local: 0.02
  lr_global: 0.02
  optimizer: adam
  eps: 0.0025                   # squared-value units (tolerated value gap ~ 0.05)
  past_task_sampling: all       # switch to "sample" once task count grows
  entropy_coef: 0.01
  eval_episodes: 64
  eval_all_tasks: true
  eval_probe_every: 50
