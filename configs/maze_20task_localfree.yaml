# === 20-maze continual navigation (11x11), SAMPLED REINFORCE ===
# One distinct maze per task (walls, dead-ends, braided loops -> multiple paths).
# Start & goal randomized per episode (BFS-verified reachable). Observation =
# current cell + goal cell + local 5x5 wall patch (one shared head, NO task-id).
# Reward = BFS-shortest-path potential shaping + terminal goal reward + per-maze
# wall-hit penalty (0 for some mazes, a random negative for others); with
# discounting, shorter paths score higher. UNCONSTRAINED-LOCAL variant.
experiment:
  name: maze_20task_localfree
  seed: 0
  results_dir: results
  device: cpu
  log_every: 100

env:
  family: maze
  params:
    size: 11
    braid: 0.08
    slip: 0.1
    gamma: 0.99
    goal_reward: 1.0
    shaping: 1.0
    view_k: 5
    max_steps: 44
    wall_penalty_prob: 0.5
    wall_penalty_max: 0.3
  tasks:
    - { maze_seed: 0 }
    - { maze_seed: 1 }
    - { maze_seed: 2 }
    - { maze_seed: 3 }
    - { maze_seed: 4 }
    - { maze_seed: 5 }
    - { maze_seed: 6 }
    - { maze_seed: 7 }
    - { maze_seed: 8 }
    - { maze_seed: 9 }
    - { maze_seed: 10 }
    - { maze_seed: 11 }
    - { maze_seed: 12 }
    - { maze_seed: 13 }
    - { maze_seed: 14 }
    - { maze_seed: 15 }
    - { maze_seed: 16 }
    - { maze_seed: 17 }
    - { maze_seed: 18 }
    - { maze_seed: 19 }

policy:
  kind: mlp                    # ONE shared head (no per-task heads)
  hidden_sizes: [256, 256]
  task_conditioned: false      # NO task-id

estimator:
  kind: monte_carlo
  episodes_per_grad: 64
  episodes_per_eval: 64
  episodes_per_ref: 96
  baseline: batch_mean
  time_discount_weighting: true

duals:
  kind: projected_ascent
  lr: 1.0
  init: 0.0
  max_value: 100.0
  warm_start: true

trainer:
  cycles_per_task: 2
  local_steps: 600
  global_steps: 250
  task1_steps: 1200
  lr_local: 0.003
  lr_global: 0.003
  optimizer: adam
  eps: 0.05
  past_task_sampling: sample
  entropy_coef: 0.01
  eval_episodes: 64
  eval_all_tasks: true
  eval_probe_every: 100
  report_return: false         # discounted value = graded, prefers shorter paths
  local_unconstrained: true
