# Tier 0: exact-gradient gridworld, canonical 2-task demo. Zero sampling
# noise -- verifies the primal-dual updates (eqs 22-24 / 30-32) and shows the
# core result: the constrained global retains BOTH tasks, while an
# unconstrained baseline (duals.lr = 0) forgets the current task as it
# over-consolidates the past. Runs in well under a minute on CPU.
#
# NOTE on longer sequences: with a shared (non task-conditioned) policy the
# eq-2 warm-start (theta^(0) = phi) saturates the softmax, and by the 3rd+
# task policy gradient escapes the inherited init too slowly to learn the new
# task (see configs/gridworld_three_task.yaml and HANDOFF.md "Saturation").
experiment:
  name: gridworld_exact
  seed: 42
  results_dir: results
  log_every: 10

env:
  family: gridworld
  params:
    size: 4
    slip: 0.1
    gamma: 0.9
    goal_reward: 1.0
    step_penalty: 0.0
    start: uniform
    max_steps: 60
  tasks:            # adjacent-corner goals: conflict present but escapable
    - goal: [0, 3]
    - goal: [3, 3]

policy:
  kind: tabular

estimator:
  kind: exact

duals:
  kind: projected_ascent
  lr: 8.0           # eta on the squared shortfall (tiny units -> large gain)
  init: 0.0
  max_value: 200.0
  warm_start: true

trainer:
  cycles_per_task: 3
  local_steps: 200
  global_steps: 200
  task1_steps: 150     # kept modest: over-training task 1 saturates the init
  lr_local: 0.5        # tabular softmax tolerates large steps
  lr_global: 0.5
  optimizer: sgd
  eps: 0.0016          # squared-value units: tolerated value gap ~ 0.04
  past_task_sampling: all
  entropy_coef: 0.0
  eval_episodes: 32
  eval_all_tasks: true
