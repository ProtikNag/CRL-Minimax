# === CartPole continual proof-of-concept: 6 physics-shifted tasks ===
#
# Six CartPole variants (same 4-D state, same 2 actions; only the physics
# changes) learned in sequence with a multi-head policy + task identifiers.
# Performance is reported as balancing steps / success rate (NOT value): a
# task is "solved" when the pole survives the full 500-step horizon.
#
# The Monte-Carlo estimator uses the batched torch CartPole rollout
# (crl/envs/cartpole.py::vector_rollout, verified to match gym exactly), which
# is what makes long balancing episodes affordable.
#
# One seed (SLURM array index):
#   python -m experiments.multiseed_comparison \
#     --config configs/cartpole_multihead.yaml --name cartpole_multihead --seed 0 \
#     --methods constrained finetune joint
# Aggregate:
#   python -m experiments.aggregate_seeds \
#     --config configs/cartpole_multihead.yaml --name cartpole_multihead \
#     --seeds 0 1 2 --methods constrained finetune joint
experiment:
  name: cartpole_multihead
  seed: 0
  results_dir: results
  log_every: 50

env:
  family: cartpole
  params:
    gamma: 0.99
    max_steps: 300          # balancing horizon; "solved" = survives all 300 steps
                            # (kept below the v1 default of 500 to bound rollout cost)
  tasks:                    # physics shifts strong enough to induce interference
    - {}                                       # 1: default CartPole-v1
    - { length: 1.0, masspole: 0.5 }           # 2: long heavy pole
    - { gravity: 18.0 }                        # 3: high gravity
    - { masscart: 1.5, force_mag: 7.0 }        # 4: heavy cart, weaker push
    - { length: 0.25, masspole: 0.05 }         # 5: short light pole
    - { gravity: 5.0 }                         # 6: low gravity

policy:
  kind: multihead
  hidden_sizes: [64, 64]
  task_conditioned: true

estimator:
  kind: monte_carlo
  episodes_per_grad: 24
  episodes_per_eval: 24
  episodes_per_ref: 48
  baseline: batch_mean
  time_discount_weighting: true

duals:
  # Discounted value scale here is ~0-100 (gamma 0.99 over 500 steps), so the
  # squared shortfall F ~ gap^2 can be large; keep the dual step small and watch
  # mu/lambda magnitudes on the tuning run. eps is in squared-value units.
  kind: projected_ascent
  lr: 0.003
  init: 0.0
  max_value: 100.0
  warm_start: true

trainer:
  cycles_per_task: 2
  local_steps: 120
  global_steps: 120
  task1_steps: 300
  lr_local: 0.01
  lr_global: 0.01
  optimizer: adam
  eps: 16.0                 # squared-value units: tolerated value gap ~ 4 (of ~75)
  past_task_sampling: sample
  entropy_coef: 0.01
  eval_episodes: 24
  eval_all_tasks: true
  eval_probe_every: 100
